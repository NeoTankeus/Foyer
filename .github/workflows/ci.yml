name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  front:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  rls:
    name: Tests RLS (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer PostgreSQL + pgTAP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-16 postgresql-16-pgtap
          sudo systemctl stop postgresql || true
      - name: Exécuter les tests RLS
        run: bash scripts/tester-rls.sh
